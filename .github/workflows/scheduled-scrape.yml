name: Scheduled Scraper Trigger

on:
  schedule:
    # Horarios en UTC (Chile = UTC-3 en horario estándar)
    # Se ejecutan 5 minutos ANTES de la hora objetivo para
    # darle tiempo a Railway de despertar el contenedor.
    # 08:55 Chile = 11:55 UTC  (para scrape de las 09:00)
    # 10:55 Chile = 13:55 UTC  (para scrape de las 11:00)
    # 12:55 Chile = 15:55 UTC  (para scrape de las 13:00)
    # 15:55 Chile = 18:55 UTC  (para scrape de las 16:00)
    # 17:55 Chile = 20:55 UTC  (para scrape de las 18:00)
    # 19:55 Chile = 22:55 UTC  (para scrape de las 20:00)
    - cron: '55 11 * * 1-5'  # 08:55 Chile (Lun-Vie)
    - cron: '55 13 * * 1-5'  # 10:55 Chile
    - cron: '55 15 * * 1-5'  # 12:55 Chile
    - cron: '55 18 * * 1-5'  # 15:55 Chile
    - cron: '55 20 * * 1-5'  # 17:55 Chile
    - cron: '55 22 * * 1-5'  # 19:55 Chile
  workflow_dispatch:  # Permite ejecución manual desde GitHub

jobs:
  trigger-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Scraper
        run: |
          echo "Triggering scraper at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            "${{ secrets.RAILWAY_APP_URL }}/api/scrape")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 409 ]; then
            echo "✅ Scraper triggered successfully or already running"
          else
            echo "❌ Failed to trigger scraper"
            exit 1
          fi

      - name: Wait for completion
        run: |
          echo "Waiting 30 seconds for the service to start processing..."
          sleep 30
          
          STATUS=$(curl -s "${{ secrets.RAILWAY_APP_URL }}/api/status")
          echo "Scraper status: $STATUS"
